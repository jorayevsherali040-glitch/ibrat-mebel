
<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Buvayda Ibrat Mebel | Admin Panel</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      min-height: 100vh;
      background: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .login-box {
      width: 100%;
      max-width: 420px;
      background: #ffffff;
      padding: 40px;
      border-radius: 18px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.4);
    }

    .brand {
      text-align: center;
      margin-bottom: 30px;
    }

    .brand h1 {
      font-size: 26px;
      color: #111;
      margin-bottom: 8px;
    }

    .brand p {
      color: #777;
      font-size: 14px;
    }

    .admin-label {
      display: inline-block;
      background: #d2a04e;
      color: #111;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: bold;
      margin-bottom: 15px;
    }

    .form-group {
      margin-bottom: 18px;
    }

    label {
      display: block;
      margin-bottom: 7px;
      font-size: 14px;
      font-weight: bold;
      color: #333;
    }

    input {
      width: 100%;
      padding: 14px;
      border: 1px solid #ddd;
      border-radius: 9px;
      outline: none;
      font-size: 15px;
    }

    input:focus {
      border-color: #d2a04e;
    }

    button {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 9px;
      background: #d2a04e;
      color: #111;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 5px;
    }

    button:hover {
      background: #bc8b3d;
    }

    #message {
      margin-top: 18px;
      text-align: center;
      font-size: 14px;
      min-height: 20px;
    }

    .back {
      display: block;
      text-align: center;
      margin-top: 25px;
      color: #777;
      text-decoration: none;
      font-size: 14px;
    }

    .back:hover {
      color: #111;
    }
  </style>
</head>

<body>

  <div class="login-box">

    <div class="brand">

      <div class="admin-label">
        ADMIN PANEL
      </div>

      <h1>BUVAYDA IBRAT MEBEL</h1>

      <p>
        Sayt boshqaruv tizimiga kirish
      </p>

    </div>


    <form id="loginForm">

      <div class="form-group">

        <label>
          Email
        </label>

        <input
          type="email"
          id="email"
          placeholder="Email manzilingiz"
          required
        >

      </div>


      <div class="form-group">

        <label>
          Parol
        </label>

        <input
          type="password"
          id="password"
          placeholder="Parolingiz"
          required
        >

      </div>


      <button type="submit">
        ADMIN PANELGA KIRISH
      </button>

    </form>


    <div id="message"></div>


    <a href="index.html" class="back">
      ← Saytga qaytish
    </a>

  </div>


  <script type="module">

    import { initializeApp }
    from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";

    import {
      getAuth,
      signInWithEmailAndPassword,
      onAuthStateChanged
    }
    from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";


    const firebaseConfig = {

      apiKey:
      "AIzaSyBNQ_14GHXIa1s_8_480-e2NAEr7boZlKw",

      authDomain:
      "buvayda-ibrat-mebel.firebaseapp.com",

      projectId:
      "buvayda-ibrat-mebel",

      storageBucket:
      "buvayda-ibrat-mebel.firebasestorage.app",

      messagingSenderId:
      "630152385372",

      appId:
      "1:630152385372:web:9ba8311493052009532799",

      measurementId:
      "G-S6SCXCSE88"

    };


    const app = initializeApp(firebaseConfig);

    const auth = getAuth(app);


    const loginForm =
    document.getElementById("loginForm");

    const message =
    document.getElementById("message");


    loginForm.addEventListener(
      "submit",
      async function(event) {

        event.preventDefault();


        const email =
        document.getElementById("email").value;


        const password =
        document.getElementById("password").value;


        message.style.color = "#555";

        message.textContent =
        "Tekshirilmoqda...";


        try {

          await signInWithEmailAndPassword(
            auth,
            email,
            password
          );


          message.style.color = "green";

          message.textContent =
          "Muvaffaqiyatli kirdingiz!";


          setTimeout(function() {

            window.location.href =
            "dashboard.html";

          }, 800);


        } catch (error) {

          console.error(error);


          message.style.color = "red";

          message.textContent =
          "Email yoki parol noto‘g‘ri.";

        }

      }
    );


    onAuthStateChanged(
      auth,
      function(user) {

        if (user) {

          console.log(
            "Admin tizimga kirgan:",
            user.email
          );

        }

      }
    );

  </script>

</body>
</html>
